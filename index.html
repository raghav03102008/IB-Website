<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IB Study Dashboard</title>

  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #101018;
  color: #eeeeee;
  font-family: Arial, sans-serif;
  min-height: 100vh;
}

/* NAV */
nav {
  background: #1b1b2b;
  border-bottom: 1px solid #333333;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #9b7cff;
}

.nav-tabs {
  display: flex;
  gap: 8px;
}

.nav-tab {
  padding: 8px 14px;
  border: none;
  background: transparent;
  color: #bbbbbb;
  cursor: pointer;
  border-radius: 5px;
  font-size: 14px;
}

.nav-tab:hover {
  background: #2b2b40;
  color: white;
}

.nav-tab.active {
  background: #6d4aff;
  color: white;
}

.timer-display {
  font-size: 17px;
  font-weight: bold;
  color: #6bdcff;
  padding: 6px 12px;
  border-radius: 5px;
  border: 1px solid #333333;
}

/* LAYOUT */
.page {
  padding: 30px 20px;
  max-width: 1050px;
  margin: 0 auto;
}

/* HERO */
.hero {
  text-align: center;
  padding: 30px 0;
}

.hero h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.hero p {
  color: #aaaaaa;
  font-size: 17px;
}

/* SUBJECT CARDS */
.subject-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 16px;
  margin-top: 25px;
}

.subject-card {
  background: #202035;
  border: 1px solid #33334d;
  border-radius: 8px;
  padding: 18px;
  cursor: pointer;
  text-align: left;
}

.subject-card:hover {
  border-color: #8b5cf6;
}

.subject-card .icon {
  font-size: 28px;
  margin-bottom: 8px;
}

.subject-card h3 {
  font-size: 17px;
  margin-bottom: 5px;
}

.subject-card p {
  font-size: 14px;
  color: #aaaaaa;
}

.badge {
  display: inline-block;
  padding: 4px 9px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
  margin-top: 10px;
}

.badge.hl {
  background: #33245a;
  color: #c4b5fd;
}

.badge.sl {
  background: #164052;
  color: #8eeaff;
}

.badge.core {
  background: #164634;
  color: #86efac;
}

@media (max-width: 600px) {
  nav {
    padding: 0 10px;
  }

  .nav-tab span {
    display: none;
  }

  .page {
    padding: 15px;
  }

  .hero h1 {
    font-size: 28px;
  }
}
  </style>
</head>

<body>
  <nav>
    <div class="logo">📚 IB Hub</div>

    <div class="nav-tabs">
      <button class="nav-tab active">🏠 <span>Home</span></button>
      <button class="nav-tab">🃏 <span>Flashcards</span></button>
      <button class="nav-tab">❓ <span>Quiz</span></button>
      <button class="nav-tab">✅ <span>Topics</span></button>
    </div>

    <div class="timer-display" title="Study Timer">⏱ 00:00</div>
  </nav>

  <main class="page">
    <section class="hero">
      <h1>Your IB Study Hub 🎓</h1>
      <p>Flashcards · Quizzes · Topic checklists · Study timer — all in one place</p>
    </section>

    <section class="subject-grid" id="homeSubjects" aria-label="IB subjects"></section>
  </main>

  <script>
const SUBJECTS = [
  { icon: '➗', name: 'Mathematics', group: 'Group 5', levels: ['AA HL', 'AA SL', 'AI SL'] },
  { icon: '⚛️', name: 'Physics', group: 'Group 4', levels: ['HL', 'SL'] },
  { icon: '🧪', name: 'Chemistry', group: 'Group 4', levels: ['HL', 'SL'] },
  { icon: '🧬', name: 'Biology', group: 'Group 4', levels: ['HL', 'SL'] },
  { icon: '📈', name: 'Economics', group: 'Group 3', levels: ['HL', 'SL'] },
  { icon: '📜', name: 'History', group: 'Group 3', levels: ['HL', 'SL'] },
  { icon: '📖', name: 'English A', group: 'Group 1', levels: ['HL', 'SL'] },
  { icon: '🌍', name: 'ESS', group: 'Group 3/4', levels: ['SL'] },
  { icon: '💭', name: 'TOK', group: 'Core', levels: ['Core'] },
  { icon: '✍️', name: 'Extended Essay', group: 'Core', levels: ['Core'] },
  { icon: '📁', name: 'IAs & CAS', group: 'Core', levels: ['Core'] }
];

function buildHome() {
  const grid = document.getElementById('homeSubjects');

  SUBJECTS.forEach((subject) => {
    const card = document.createElement('div');
    card.className = 'subject-card';

    const badgeClass =
      subject.group === 'Core'
        ? 'core'
        : subject.levels.includes('HL')
          ? 'hl'
          : 'sl';

    card.innerHTML = `
      <div class="icon">${subject.icon}</div>
      <h3>${subject.name}</h3>
      <p>${subject.group}</p>
      <span class="badge ${badgeClass}">${subject.levels.join(' · ')}</span>
    `;

    grid.appendChild(card);
  });
}

buildHome();
  </script>
</body>
</html>
