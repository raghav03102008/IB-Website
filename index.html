<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IB Study Dashboard</title>

  <style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #101018;
  color: #eeeeee;
}

/* navigation bar */
nav {
  background-color: #1b1b2b;
  border-bottom: 1px solid #333333;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #9b7cff;
}

.nav-tabs {
  display: flex;
  gap: 8px;
}

.nav-tab {
  padding: 8px 14px;
  border: none;
  border-radius: 5px;
  background-color: transparent;
  color: #bbbbbb;
  cursor: pointer;
}

.nav-tab:hover {
  background-color: #2b2b40;
  color: #ffffff;
}

.nav-tab.active {
  background-color: #6d4aff;
  color: #ffffff;
}

.timer-display {
  padding: 6px 12px;
  border: 1px solid #333333;
  border-radius: 5px;
  color: #6bdcff;
  font-weight: bold;
}

/* page content */
.page {
  max-width: 1050px;
  margin: 0 auto;
  padding: 30px 20px;
}

.hero {
  text-align: center;
  padding: 30px 0;
}

.hero h1 {
  margin-bottom: 10px;
  font-size: 36px;
}

.hero p {
  color: #aaaaaa;
  font-size: 17px;
}

/* subject cards */
.subject-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 16px;
  margin-top: 25px;
}

.subject-card {
  background-color: #202035;
  border: 1px solid #33334d;
  border-radius: 8px;
  padding: 18px;
  cursor: pointer;
}

.subject-card:hover {
  border-color: #8b5cf6;
}

.icon {
  font-size: 28px;
  margin-bottom: 8px;
}

.subject-card h3 {
  margin: 0;
  font-size: 17px;
}

.subject-card p {
  margin-top: 5px;
  color: #aaaaaa;
  font-size: 14px;
}

.badge {
  display: inline-block;
  margin-top: 10px;
  padding: 4px 9px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
}

.hl {
  background-color: #33245a;
  color: #c4b5fd;
}

.sl {
  background-color: #164052;
  color: #8eeaff;
}

.core {
  background-color: #164634;
  color: #86efac;
}

/* phone layout */
@media (max-width: 600px) {
  nav {
    padding: 10px;
  }

  .nav-tab span {
    display: none;
  }

  .page {
    padding: 15px;
  }

  .hero h1 {
    font-size: 28px;
  }
}
  </style>
</head>

<body>
  <nav>
    <div class="logo">📚 IB Hub</div>

    <div class="nav-tabs">
      <button class="nav-tab active">🏠 <span>Home</span></button>
      <button class="nav-tab">🃏 <span>Flashcards</span></button>
      <button class="nav-tab">❓ <span>Quiz</span></button>
      <button class="nav-tab">✅ <span>Topics</span></button>
    </div>

    <div class="timer-display">⏱ 00:00</div>
  </nav>

  <main class="page">
    <section class="hero">
      <h1>Your IB Study Hub 🎓</h1>
      <p>Flashcards · Quizzes · Topic checklists · Study timer — all in one place</p>
    </section>

    <section class="subject-grid" id="homeSubjects"></section>
  </main>

  <script>
const subjects = [
  {
    icon: '➗',
    name: 'Mathematics',
    group: 'Group 5',
    levels: ['AA HL', 'AA SL', 'AI SL']
  },
  {
    icon: '⚛️',
    name: 'Physics',
    group: 'Group 4',
    levels: ['HL', 'SL']
  },
  {
    icon: '🧪',
    name: 'Chemistry',
    group: 'Group 4',
    levels: ['HL', 'SL']
  },
  {
    icon: '🧬',
    name: 'Biology',
    group: 'Group 4',
    levels: ['HL', 'SL']
  },
  {
    icon: '📈',
    name: 'Economics',
    group: 'Group 3',
    levels: ['HL', 'SL']
  },
  {
    icon: '📜',
    name: 'History',
    group: 'Group 3',
    levels: ['HL', 'SL']
  },
  {
    icon: '📖',
    name: 'English A',
    group: 'Group 1',
    levels: ['HL', 'SL']
  },
  {
    icon: '🌍',
    name: 'ESS',
    group: 'Group 3/4',
    levels: ['SL']
  },
  {
    icon: '💭',
    name: 'TOK',
    group: 'Core',
    levels: ['Core']
  },
  {
    icon: '✍️',
    name: 'Extended Essay',
    group: 'Core',
    levels: ['Core']
  },
  {
    icon: '📁',
    name: 'IAs & CAS',
    group: 'Core',
    levels: ['Core']
  }
];

function getBadgeClass(subject) {
  if (subject.group === 'Core') {
    return 'core';
  }

  if (subject.levels.includes('HL')) {
    return 'hl';
  }

  return 'sl';
}

function makeSubjectCard(subject) {
  const card = document.createElement('div');
  const icon = document.createElement('div');
  const title = document.createElement('h3');
  const group = document.createElement('p');
  const badge = document.createElement('span');

  card.className = 'subject-card';
  icon.className = 'icon';
  badge.className = 'badge ' + getBadgeClass(subject);

  icon.textContent = subject.icon;
  title.textContent = subject.name;
  group.textContent = subject.group;
  badge.textContent = subject.levels.join(' · ');

  card.appendChild(icon);
  card.appendChild(title);
  card.appendChild(group);
  card.appendChild(badge);

  return card;
}

function showSubjects() {
  const subjectGrid = document.getElementById('homeSubjects');

  for (let i = 0; i < subjects.length; i++) {
    const card = makeSubjectCard(subjects[i]);
    subjectGrid.appendChild(card);
  }
}

showSubjects();
  </script>
</body>
</html>
